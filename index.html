<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Reactions</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    .btn {
      font-size: 40px;
      margin: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.2);
    }

    .count {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Оставь реакцию</h1>

<div>
  <span class="btn" onclick="send('like')">👍</span>
  <span class="btn" onclick="send('sad')">😢</span>
  <span class="btn" onclick="send('lol')">😂</span>
</div>

<div class="count">
  👍 <span id="like">0</span> |
  😢 <span id="sad">0</span> |
  😂 <span id="lol">0</span>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyx75ubc-JrYcJla4nvWzm40WW7_82C524lrSE4phaW8ViBf6WNkQexS5cT_0iJjO6O3g/exec";

  let lastData = {};
  let isSending = false;

  async function load() {
    // ❗ не грузим, если сейчас отправляем
    if (isSending) return;

    try {
      const res = await fetch(API_URL);
      const data = await res.json();

      if (JSON.stringify(data) !== JSON.stringify(lastData)) {
        document.getElementById("like").innerText = data.like || 0;
        document.getElementById("sad").innerText = data.sad || 0;
        document.getElementById("lol").innerText = data.lol || 0;

        lastData = data;
      }
    } catch (e) {
      console.error("load error", e);
    }
  }

  async function send(type) {
    if (isSending) return; // защита от спама кликов

    isSending = true;

    try {
      // 👉 ВАЖНО: добавляем cache-buster
      await fetch(API_URL + "?type=" + type + "&t=" + Date.now());

      // 👉 сразу обновляем после клика
      await load();
    } catch (e) {
      console.error("send error", e);
    }

    isSending = false;
  }

  // 🚀 автообновление
  setInterval(load, 2000);

  load();
</script>

</body>
</html>
